<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Thanh Tran, PhD | Principal Data Scientist & AI Engineer</title>
    <meta
      name="description"
      content="Portfolio of Thanh Tran, PhD — Principal Data Scientist & AI Engineer." />
    <style>
      :root { --bg:#0a0616;--surface:#171028;--surface-2:#20153a;--line:#352356;--text:#f5f2ff;--muted:#c1b4e6;--accent:#a855f7; }
      * { box-sizing:border-box; } html { scroll-behavior:smooth; }
      body { margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);background:radial-gradient(circle at 10% 0%,#26134c 0%,var(--bg) 35%); }
      a{color:#d8b4fe;} .container{width:min(1100px,calc(100% - 2rem));margin:0 auto;} .header{border-bottom:1px solid var(--line);} 
      .nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 0;position:sticky;top:0;background:rgba(10,6,22,.9);backdrop-filter:blur(6px);} 
      .brand{text-decoration:none;font-weight:700;color:var(--text);} .brand span{color:var(--accent);} .nav-links{list-style:none;display:flex;gap:1rem;padding:0;margin:0;} .nav-links a{text-decoration:none;color:var(--muted);font-size:.95rem;} .nav-links a:hover{color:var(--text);} 
      .hero{padding:4rem 0 3rem;} .kicker{text-transform:uppercase;letter-spacing:.08em;color:#8be9fd;font-size:.78rem;} h1{font-size:clamp(2rem,5vw,3.3rem);margin:.4rem 0 .8rem;} .lead{color:var(--muted);max-width:700px;line-height:1.7;} 
      .cta-row{display:flex;flex-wrap:wrap;gap:.65rem;margin-top:1rem;} .btn{border:1px solid var(--line);border-radius:999px;padding:.55rem .95rem;text-decoration:none;color:var(--text);background:transparent;} .btn-primary{background:linear-gradient(90deg,#9333ea,#7e22ce);border-color:transparent;}
      .section{padding:1.2rem 0 1.4rem;} .card{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:1rem;} .muted-card{opacity:.85;} h2{margin:0 0 .75rem;} .section-note{color:var(--muted);} 
      .grid{display:grid;gap:.8rem;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));} .timeline{display:grid;gap:.7rem;} .timeline-item p{margin:0;} 
      .tabs{display:flex;flex-wrap:wrap;gap:.5rem;margin:.8rem 0;} .tab{border:1px solid var(--line);background:#130c22;color:var(--muted);border-radius:999px;padding:.35rem .8rem;cursor:pointer;} .tab.active{color:var(--text);background:var(--surface-2);} 
      .publication-grid .card p{color:var(--muted);margin:.35rem 0;} .actions{display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap;} .footer{border-top:1px solid var(--line);color:var(--muted);padding:1.1rem 0 1.8rem;margin-top:1rem;} 
      @media (max-width:760px){ .nav{flex-direction:column;gap:.7rem;} .nav-links{flex-wrap:wrap;justify-content:center;} }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel">
      const publications = [
        { title:"M2NN: A multimodal mobility neural network framework", venue:"Transportation Research Part C (2025)", category:"transport", link:"https://www.sciencedirect.com/science/article/pii/S0968090X25004620", value:"Demonstrates scalable multimodal traffic prediction with clear operational planning relevance." },
        { title:"MSGNN: A multimodal urban traffic speed prediction model", venue:"Transportation Research Part C (2023)", category:"transport", link:"https://www.sciencedirect.com/science/article/pii/S0968090X23003698", value:"Improves congestion forecasting to support safer, faster, and more proactive traffic operations." },
        { title:"Trajectory-user linking with a deep neural network", venue:"Australasian Transport Research Forum (2023)", category:"methods", link:"https://www.australasiantransportresearchforum.org.au/wp-content/uploads/2023/09/ATRF_2023_Paper_43.pdf", value:"Shows practical representation-learning design for mobility behavior intelligence applications." },
        { title:"Online traffic incident prediction with hybrid graph continual learning", venue:"Australasian Transport Research Forum (2022)", category:"transport", link:"https://trid.trb.org/View/2259782", value:"Highlights deployable continual-learning methods for incident early-warning pipelines." }
      ];

      function App(){
        const [tab,setTab] = React.useState("all");
        const filtered = tab === "all" ? publications : publications.filter((p)=>p.category===tab);
        return (<div>
          <header className="header" id="home"><nav className="nav container"><a href="#home" className="brand">Thanh Tran<span>, PhD</span></a><ul className="nav-links"><li><a href="#about">About</a></li><li><a href="#experience">Experience</a></li><li><a href="#projects">Projects</a></li><li><a href="#publications">Publications</a></li><li><a href="#contact">Contact</a></li></ul></nav><div className="hero container"><p className="kicker">Principal Data Scientist & AI Engineer</p><h1>Building practical AI systems with research depth.</h1><p className="lead">I lead end-to-end data and AI programs, combining multimodal deep learning, graph methods, and LLM workflows into deployable solutions.</p><div className="cta-row"><a className="btn btn-primary" href="mailto:t.tranvo187@gmail.com">Contact</a><a className="btn" target="_blank" rel="noreferrer" href="https://www.linkedin.com/in/thanhvtr">LinkedIn</a><a className="btn" target="_blank" rel="noreferrer" href="https://thanhvotran.github.io/">Personal website</a></div></div></header>
          <main>
            <section id="about" className="section"><div className="container card"><h2>About</h2><p>Senior analytics and AI leader with experience across public-sector transport, academia, and enterprise delivery. PhD in multimodal deep learning and hands-on track record in production-grade ML and GenAI.</p></div></section>
            <section id="experience" className="section"><div className="container"><h2>Experience</h2><div className="timeline"><article className="timeline-item card"><p>Senior Principal, Data Analytics · The University of Queensland · Feb 2026 – Present</p></article><article className="timeline-item card"><p>Data Scientist · Department for Infrastructure and Transport · Jun 2024 – Jan 2026</p></article><article className="timeline-item card"><p>Machine Learning Instructor / TA · The University of Queensland · Feb 2021 – Aug 2024</p></article></div></div></section>
            <section id="projects" className="section"><div className="container"><h2>Projects</h2><div className="grid"><article className="card"><h3>Traffic Incident Intelligence</h3><p>Graph + multimodal models for risk forecasting and operational triage.</p></article><article className="card"><h3>LLM Decision Copilot</h3><p>Retrieval-assisted assistant for drafting, policy support, and Q&A workflows.</p></article><article className="card muted-card"><h3>More projects</h3><p>Additional project case studies and GitHub demos coming soon.</p></article></div></div></section>
            <section id="publications" className="section"><div className="container"><h2>Publications (Employer Showcase)</h2><p className="section-note">Each publication includes links and value framing for potential employers or clients.</p><div className="tabs"><button className={`tab ${tab === "all" ? "active" : ""}`} onClick={()=>setTab("all")}>All</button><button className={`tab ${tab === "transport" ? "active" : ""}`} onClick={()=>setTab("transport")}>Transport AI</button><button className={`tab ${tab === "methods" ? "active" : ""}`} onClick={()=>setTab("methods")}>Methods</button></div><div className="grid publication-grid">{filtered.map((item)=><article key={item.title} className="card"><h3>{item.title}</h3><p>{item.venue}</p><p>{item.value}</p><div className="actions"><a className="btn" href={item.link} target="_blank" rel="noreferrer">Read publication</a><a className="btn" href="#contact">Discuss this work</a></div></article>)}</div></div></section>
            <section id="contact" className="section"><div className="container card"><h2>Contact</h2><p>Brisbane, Australia · <a href="mailto:t.tranvo187@gmail.com">t.tranvo187@gmail.com</a></p></div></section>
          </main>
          <footer className="footer"><div className="container">© 2026 Thanh Tran, PhD · Principal Data Scientist & AI Engineer</div></footer>
        </div>);
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
